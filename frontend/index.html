<!--
  index.html - The HTML Entry Point
  ==================================

  This is the ONLY HTML file in the entire React application.
  React is a Single Page Application (SPA) framework — instead of having
  separate HTML files for each "page", we have one HTML file and React
  dynamically changes what's displayed using JavaScript.

  How it works:
  1. The browser loads this HTML file
  2. It finds the <script> tag pointing to /src/main.jsx
  3. Vite compiles the JSX into JavaScript and serves it to the browser
  4. main.jsx runs, finds the <div id="root">, and mounts the React app into it
  5. From this point on, React controls everything inside <div id="root">

  The <div id="root"> starts EMPTY. React fills it with the component tree:
    <App>
      <StatsPanel />
      <PlayerSearch />
      <PlayerForm />
      <PlayerTable />
    </App>

  Key elements:
  - <!doctype html>: Tells the browser this is an HTML5 document
  - <meta charset="UTF-8">: Supports all characters (accents, emojis, etc.)
  - <meta name="viewport">: Makes the page responsive on mobile devices
  - <div id="root">: The container where React renders the entire application
  - <script type="module">: Loads main.jsx as an ES module (supports import/export)
    The "module" type is required for Vite's dev server to work correctly.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLB Player Stats</title>

    <!-- ===================================================================
         PWA (Progressive Web App) Meta Tags
         ===================================================================
         These tags tell mobile browsers how to display our app when
         "installed" to the home screen. Without these, it opens as a
         regular website with browser bars. WITH these, it goes full-screen.
         =================================================================== -->

    <!-- theme-color: Sets the color of the browser's address bar (Android)
         and the status bar area (iOS) to match our dark theme.
         This is purely cosmetic — it makes the transition from browser
         to app feel seamless by matching the surrounding UI chrome. -->
    <meta name="theme-color" content="#0a1929" />

    <!-- description: A short summary shown when sharing the link on social
         media, in search results, and in some app listings. -->
    <meta name="description" content="MLB player stats with fantasy league scoring" />

    <!-- apple-mobile-web-app-capable: This is the iOS-specific tag that tells
         Safari "yes, this website CAN run as a standalone app."
         Without this, even with a manifest, iOS Safari won't go full-screen. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- apple-mobile-web-app-status-bar-style: Controls how the iPhone's
         status bar (time, battery, signal) looks when the app is open.
         Options:
           "default"          = black text on white background
           "black"            = white text on black background
           "black-translucent" = white text, status bar overlays the app content
         We use "black-translucent" so the dark theme extends to the very top. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- apple-touch-icon: The icon that appears on the iPhone home screen.
         iOS ignores the manifest icons and looks specifically for this tag.
         The recommended size is 180x180 pixels (used for modern iPhones).
         iOS will automatically round the corners — no need to do it yourself. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
  </head>
  <body>
    <!-- React mounts the entire application inside this div.
         The id="root" is referenced in main.jsx:
         createRoot(document.getElementById('root')).render(<App />) -->
    <div id="root"></div>

    <!-- Vite serves this as compiled JavaScript during development.
         In production (npm run build), Vite bundles everything into
         optimized static files in the dist/ directory. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
